version: 0.2

env:
  shell: bash
  variables:
    KUBECTL_VERSION: "v1.36.2"
    HELM_VERSION: "v3.21.2"
    EKS_CLUSTER_NAME: "jjp6402-eks"
    ECR_CREDENTIAL_HELPER_VERSION: "v0.12.0"
    ECR_REPOSITORY: "jjp6402-tasky-app"
    SIGNING_PROFILE_PARAMETER_NAME: "/jjp6402/signing-profile-name"

phases:
  install:
    commands:
      - set -euo pipefail
      - pwd
      - ls -la codebuild/scripts
      - chmod +x codebuild/scripts/*.sh
      - bash ./codebuild/scripts/install-common.sh
      - bash ./codebuild/scripts/install-kubectl.sh "$KUBECTL_VERSION"
      - bash ./codebuild/scripts/install-helm.sh "$HELM_VERSION"
      - bash ./codebuild/scripts/install-aws-signer-notation-plugin.sh
      - bash ./codebuild/scripts/install-ecr-credential-helper.sh "$ECR_CREDENTIAL_HELPER_VERSION" "$AWS_ACCOUNT_ID" "$AWS_REGION"
      - kubectl version --client=true
      - helm version
      - notation version
      - notation plugin ls
  pre_build:
    commands:
      - set -euo pipefail
      - pwd
      - |
        IMAGE_ENV_PATH=""
        for candidate in \
          "${CODEBUILD_SRC_DIR_build_output:-}/image.env" \
          "${CODEBUILD_SRC_DIR:-}/image.env" \
          "./image.env"; do
          if [ -n "$candidate" ] && [ -f "$candidate" ]; then
            IMAGE_ENV_PATH="$candidate"
            break
          fi
        done
        if [ -z "$IMAGE_ENV_PATH" ]; then
          echo "image.env not found in primary source or build_output artifact."
          env | sort | grep '^CODEBUILD_SRC_DIR' || true
          find /codebuild/output -maxdepth 6 -name image.env -print || true
          exit 1
        fi
        echo "Using image metadata from ${IMAGE_ENV_PATH}."
        cp "$IMAGE_ENV_PATH" "${CODEBUILD_SRC_DIR}/image.env"
        source "${CODEBUILD_SRC_DIR}/image.env"
        if [ "${BUILD_STATUS:-}" != "SUCCEEDED" ]; then
          echo "Build artifact reports BUILD_STATUS=${BUILD_STATUS:-unset}; refusing to deploy."
          exit 1
        fi
        test -n "${IMAGE_REF:-}"
      - export SIGNING_PROFILE_NAME=$(aws ssm get-parameter --name "$SIGNING_PROFILE_PARAMETER_NAME" --query 'Parameter.Value' --output text)
      - test -n "$SIGNING_PROFILE_NAME"
      - 'echo "Using AWS Signer signing profile: ${SIGNING_PROFILE_NAME}"'
      - bash ./codebuild/scripts/configure-notation-trust-policy.sh "$AWS_ACCOUNT_ID" "$AWS_REGION" "$ECR_REPOSITORY" "$SIGNING_PROFILE_NAME"
      - export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - docker-credential-ecr-login version || true
      - cat "$HOME/.docker/config.json"
      - notation verify --plugin-config "aws-region=${AWS_REGION}" "$IMAGE_REF"
      - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
      - |
        CLUSTER_VPC_ID=$(aws eks describe-cluster \
          --name "$EKS_CLUSTER_NAME" \
          --region "$AWS_REGION" \
          --query 'cluster.resourcesVpcConfig.vpcId' \
          --output text)
        export CLUSTER_VPC_ID
        echo "EKS VPC ID: ${CLUSTER_VPC_ID}"

        PUBLIC_ALB_SUBNET_ROWS=$(aws ec2 describe-subnets \
          --region "$AWS_REGION" \
          --filters \
            "Name=vpc-id,Values=${CLUSTER_VPC_ID}" \
            "Name=tag:kubernetes.io/role/elb,Values=1" \
          --query 'Subnets[?MapPublicIpOnLaunch==`true`].[SubnetId,AvailabilityZone,CidrBlock]' \
          --output text | sort -k2)
        export PUBLIC_ALB_SUBNET_ROWS

        echo "Eligible public ALB subnets:"
        if [ -n "$PUBLIC_ALB_SUBNET_ROWS" ]; then
          printf '%s\n' "$PUBLIC_ALB_SUBNET_ROWS"
        else
          echo "none"
        fi

        PUBLIC_ALB_SUBNET_IDS=$(printf '%s\n' "$PUBLIC_ALB_SUBNET_ROWS" | awk 'NF {print $1}' | paste -sd, -)
        PUBLIC_ALB_SUBNET_COUNT=$(printf '%s\n' "$PUBLIC_ALB_SUBNET_ROWS" | awk 'NF {print $1}' | wc -l | tr -d ' ')
        PUBLIC_ALB_AZ_COUNT=$(printf '%s\n' "$PUBLIC_ALB_SUBNET_ROWS" | awk 'NF {print $2}' | sort -u | wc -l | tr -d ' ')
        export PUBLIC_ALB_SUBNET_IDS

        echo "Public ALB subnet IDs: ${PUBLIC_ALB_SUBNET_IDS:-none}"
        echo "Public ALB subnet count: ${PUBLIC_ALB_SUBNET_COUNT}"
        echo "Public ALB AZ count: ${PUBLIC_ALB_AZ_COUNT}"

        if [ "$PUBLIC_ALB_SUBNET_COUNT" -lt 2 ] || [ "$PUBLIC_ALB_AZ_COUNT" -lt 2 ]; then
          echo "At least two public ALB subnets in different AZs are required."
          aws ec2 describe-subnets \
            --region "$AWS_REGION" \
            --filters "Name=vpc-id,Values=${CLUSTER_VPC_ID}" \
            --query 'Subnets[].{SubnetId:SubnetId,AZ:AvailabilityZone,Cidr:CidrBlock,MapPublic:MapPublicIpOnLaunch,Tags:Tags}' \
            --output table || true
          exit 1
        fi
  build:
    commands:
      - set -euo pipefail
      - cd app/tasky/k8s
      - kubectl apply -f namespace.yaml
      - kubectl apply -f serviceaccount.yaml
      - kubectl apply -f clusterrolebinding.yaml
      - kubectl apply -f service.yaml
      - sed "s|__ALB_SUBNETS__|${PUBLIC_ALB_SUBNET_IDS}|g" ingress.yaml > /tmp/tasky-ingress.yaml
      - |
        echo "Rendered ingress manifest:"
        cat /tmp/tasky-ingress.yaml
      - kubectl apply -f /tmp/tasky-ingress.yaml
      - kubectl annotate ingress tasky -n tasky jjp6402.io/reconcile-at="$(date +%s)" --overwrite
      - kubectl get ingress tasky -n tasky -o jsonpath='{.metadata.annotations.alb\.ingress\.kubernetes\.io/subnets}{"\n"}'
      - sed "s|__IMAGE__|${IMAGE_REF}|g" deployment.yaml | kubectl apply -f -
      - kubectl annotate deployment tasky -n tasky jjp6402.io/image-signature-verified=true --overwrite
      - |
        if ! kubectl rollout status deployment/tasky -n tasky --timeout=300s; then
          echo "Tasky rollout failed. Dumping Kubernetes diagnostics."
          kubectl get deployment tasky -n tasky -o wide || true
          kubectl describe deployment tasky -n tasky || true
          kubectl get pods -n tasky -o wide || true
          kubectl describe pods -n tasky -l app=tasky || true
          kubectl logs -n tasky -l app=tasky --all-containers --tail=200 || true
          for pod in $(kubectl get pods -n tasky -l app=tasky -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "===== previous logs for ${pod} ====="
            kubectl logs -n tasky "${pod}" --all-containers --previous --tail=200 || true
          done
          kubectl get events -n tasky --sort-by=.lastTimestamp | tail -50 || true
          exit 1
        fi

artifacts:
  files:
    - image.env
  discard-paths: yes
