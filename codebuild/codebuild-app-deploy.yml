version: 0.2

env:
  shell: bash
  variables:
    KUBECTL_VERSION: "v1.36.2"
    HELM_VERSION: "v3.21.2"
    EKS_CLUSTER_NAME: "jjp6402-eks"
    ECR_CREDENTIAL_HELPER_VERSION: "v0.12.0"
    ECR_REPOSITORY: "jjp6402-tasky-app"
    SIGNING_PROFILE_NAME: "jjp6402_container"

phases:
  install:
    commands:
      - set -euo pipefail
      - pwd
      - ls -la codebuild/scripts
      - chmod +x codebuild/scripts/*.sh
      - bash ./codebuild/scripts/install-common.sh
      - bash ./codebuild/scripts/install-kubectl.sh "$KUBECTL_VERSION"
      - bash ./codebuild/scripts/install-helm.sh "$HELM_VERSION"
      - bash ./codebuild/scripts/install-aws-signer-notation-plugin.sh
      - bash ./codebuild/scripts/install-ecr-credential-helper.sh "$ECR_CREDENTIAL_HELPER_VERSION" "$AWS_ACCOUNT_ID" "$AWS_REGION"
      - kubectl version --client=true
      - helm version
      - notation version
      - notation plugin ls
      - bash ./codebuild/scripts/configure-notation-trust-policy.sh "$AWS_ACCOUNT_ID" "$AWS_REGION" "$ECR_REPOSITORY" "$SIGNING_PROFILE_NAME"
  pre_build:
    commands:
      - set -euo pipefail
      - pwd
      - |
        IMAGE_ENV_PATH=""
        for candidate in \
          "${CODEBUILD_SRC_DIR_build_output:-}/image.env" \
          "${CODEBUILD_SRC_DIR:-}/image.env" \
          "./image.env"; do
          if [ -n "$candidate" ] && [ -f "$candidate" ]; then
            IMAGE_ENV_PATH="$candidate"
            break
          fi
        done
        if [ -z "$IMAGE_ENV_PATH" ]; then
          echo "image.env not found in primary source or build_output artifact."
          env | sort | grep '^CODEBUILD_SRC_DIR' || true
          find /codebuild/output -maxdepth 6 -name image.env -print || true
          exit 1
        fi
        echo "Using image metadata from ${IMAGE_ENV_PATH}."
        source "$IMAGE_ENV_PATH"
        if [ "${BUILD_STATUS:-}" != "SUCCEEDED" ]; then
          echo "Build artifact reports BUILD_STATUS=${BUILD_STATUS:-unset}; refusing to deploy."
          exit 1
        fi
        test -n "${IMAGE_REF:-}"
      - export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - docker-credential-ecr-login version || true
      - cat "$HOME/.docker/config.json"
      - notation verify --plugin-config "aws-region=${AWS_REGION}" "$IMAGE_REF"
      - aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"
  build:
    commands:
      - set -euo pipefail
      - cd app/tasky/k8s
      - kubectl apply -f namespace.yaml
      - kubectl apply -f serviceaccount.yaml
      - kubectl apply -f clusterrolebinding.yaml
      - kubectl apply -f service.yaml
      - kubectl apply -f ingress.yaml
      - sed "s|__IMAGE__|${IMAGE_REF}|g" deployment.yaml | kubectl apply -f -
      - kubectl annotate deployment tasky -n tasky jjp6402.io/image-signature-verified=true --overwrite
      - kubectl rollout status deployment/tasky -n tasky --timeout=300s

artifacts:
  files:
    - image.env
  discard-paths: yes
