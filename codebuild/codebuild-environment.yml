version: 0.2

env:
  shell: bash
  variables:
    TF_VERSION: "1.15.7"
    CHECKOV_VERSION: "3.3.7"
    KUBECTL_VERSION: "v1.36.2"
    HELM_VERSION: "v3.21.2"
    GATEKEEPER_VERSION: "3.22.2"
    AWS_LBC_CHART_VERSION: "1.14.0"
    EKS_CLUSTER_NAME: "jjp6402-eks"

phases:
  install:
    commands:
      - set -euo pipefail
      - pwd
      - ls -la codebuild/scripts
      - chmod +x codebuild/scripts/*.sh
      - bash ./codebuild/scripts/install-common.sh
      - bash ./codebuild/scripts/install-terraform.sh "$TF_VERSION"
      - bash ./codebuild/scripts/install-checkov.sh "$CHECKOV_VERSION"
      - bash ./codebuild/scripts/install-kubectl.sh "$KUBECTL_VERSION"
      - bash ./codebuild/scripts/install-helm.sh "$HELM_VERSION"
      - terraform version
      - checkov --version
      - kubectl version --client=true
      - helm version
  pre_build:
    commands:
      - cd environment
      - 'echo "Source commit: ${CODEBUILD_RESOLVED_SOURCE_VERSION:-unknown}"'
      - git rev-parse --short HEAD 2>/dev/null || true
      - echo "Checking for stale Kubernetes provider usage before plan."
      - |
        if grep -R -n -E 'data "aws_eks_cluster" "selected"|provider "kubernetes"|provider "helm"|resource "kubernetes_|resource "helm_release"' .; then
          echo "Stale Terraform Kubernetes/Helm provider usage detected. Kubernetes objects must be managed by the pipeline scripts."
          exit 1
        fi
      - terraform fmt -check -recursive
      - terraform init
      - bash ./../codebuild/scripts/remove-kubernetes-terraform-state.sh
      - bash ./../codebuild/scripts/recover-environment-state.sh
      - terraform validate
      - 'echo "Running Checkov scan in soft-fail mode because this environment intentionally contains documented insecure variances."'
      - checkov -d . --quiet --soft-fail
  build:
    commands:
      - terraform plan -out=tfplan
      - terraform apply -auto-approve tfplan
      - bash ./../codebuild/scripts/configure-environment-kubernetes.sh
      - touch /tmp/environment_apply_complete
  post_build:
    commands:
      - |
        if [ -f /tmp/environment_apply_complete ]; then
          aws eks update-kubeconfig --name jjp6402-eks --region "$AWS_REGION"
          kubectl get nodes
          kubectl get ns
          helm list -A
          kubectl get constrainttemplates
          kubectl get constraints
          aws eks describe-cluster --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION" --query 'cluster.logging.clusterLogging' --output json
          aws configservice describe-config-rules --region "$AWS_REGION" --query 'ConfigRules[?starts_with(ConfigRuleName, `jjp6402-`)].{Name:ConfigRuleName,State:ConfigRuleState}' --output table
        else
          echo "Skipping EKS validation because terraform apply did not complete."
        fi
