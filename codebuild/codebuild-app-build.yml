version: 0.2

env:
  shell: bash
  variables:
    GO_VERSION: "1.26.5"
    TRIVY_VERSION: "v0.72.0"
    ECR_REPOSITORY: "jjp6402-tasky-app"
    SIGNING_PROFILE_PARAMETER_NAME: "/jjp6402/signing-profile-name"
    ECR_CREDENTIAL_HELPER_VERSION: "v0.12.0"

phases:
  install:
    commands:
      - set -euo pipefail
      - pwd
      - ls -la codebuild/scripts
      - chmod +x codebuild/scripts/*.sh
      - bash ./codebuild/scripts/install-common.sh
      - bash ./codebuild/scripts/install-go.sh "$GO_VERSION"
      - bash ./codebuild/scripts/install-trivy.sh "$TRIVY_VERSION"
      - bash ./codebuild/scripts/install-aws-signer-notation-plugin.sh
      - bash ./codebuild/scripts/install-ecr-credential-helper.sh "$ECR_CREDENTIAL_HELPER_VERSION" "$AWS_ACCOUNT_ID" "$AWS_REGION"
      - go version
      - trivy --version
      - notation version
      - notation plugin ls
  pre_build:
    commands:
      - set -euo pipefail
      - pwd
      - ls -la codebuild/scripts
      - chmod +x codebuild/scripts/*.sh
      - export SIGNING_PROFILE_NAME=$(aws ssm get-parameter --name "$SIGNING_PROFILE_PARAMETER_NAME" --query 'Parameter.Value' --output text)
      - test -n "$SIGNING_PROFILE_NAME"
      - 'echo "Using AWS Signer signing profile: ${SIGNING_PROFILE_NAME}"'
      - bash ./codebuild/scripts/configure-notation-trust-policy.sh "$AWS_ACCOUNT_ID" "$AWS_REGION" "$ECR_REPOSITORY" "$SIGNING_PROFILE_NAME"
      - cd app/tasky
      - test -f wizexercise.txt
      - grep -q "COPY wizexercise.txt /wizexercise.txt" Dockerfile
      - export IMAGE_TAG="1.1.${CODEBUILD_BUILD_NUMBER}"
      - export IMAGE_REPO="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
      - export IMAGE_URI="${IMAGE_REPO}:${IMAGE_TAG}"
      - export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      - printf 'BUILD_STATUS=STARTED\nIMAGE_TAG=%s\nIMAGE_URI=%s\nIMAGE_DIGEST=\nIMAGE_REF=\n' "$IMAGE_TAG" "$IMAGE_URI" > image.env
      - docker-credential-ecr-login version || true
      - cat "$HOME/.docker/config.json"
  build:
    commands:
      - set -euo pipefail
      - docker build -t "$IMAGE_URI" .
      - trivy image --severity UNKNOWN,LOW,MEDIUM --format table --output trivy-low-medium.txt "$IMAGE_URI" || true
      - trivy image --severity HIGH,CRITICAL --format table --output trivy-high-critical.txt "$IMAGE_URI"
      - cat trivy-high-critical.txt
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed "$IMAGE_URI"
      - docker push "$IMAGE_URI"
      - export IMAGE_DIGEST=$(aws ecr describe-images --repository-name "$ECR_REPOSITORY" --image-ids imageTag="$IMAGE_TAG" --query 'imageDetails[0].imageDigest' --output text)
      - export IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
      - export SIGNING_PROFILE_ARN="arn:aws:signer:${AWS_REGION}:${AWS_ACCOUNT_ID}:/signing-profiles/${SIGNING_PROFILE_NAME}"
      - notation sign --plugin com.amazonaws.signer.notation.plugin --id "$SIGNING_PROFILE_ARN" --plugin-config "aws-region=${AWS_REGION}" "$IMAGE_REF"
      - notation verify --plugin-config "aws-region=${AWS_REGION}" "$IMAGE_REF"
  post_build:
    commands:
      - |
        if [ -n "${IMAGE_DIGEST:-}" ] && [ -n "${IMAGE_REF:-}" ]; then
          printf 'BUILD_STATUS=SUCCEEDED\nIMAGE_TAG=%s\nIMAGE_URI=%s\nIMAGE_DIGEST=%s\nIMAGE_REF=%s\n' "$IMAGE_TAG" "$IMAGE_URI" "$IMAGE_DIGEST" "$IMAGE_REF" > image.env
          cat image.env
        else
          printf 'BUILD_STATUS=FAILED\nIMAGE_TAG=%s\nIMAGE_URI=%s\nIMAGE_DIGEST=\nIMAGE_REF=\n' "${IMAGE_TAG:-unknown}" "${IMAGE_URI:-unknown}" > image.env
          echo "Image build or push did not complete; wrote failed image.env placeholder."
          cat image.env
        fi

artifacts:
  files:
    - app/tasky/image.env
    - app/tasky/trivy-low-medium.txt
    - app/tasky/trivy-high-critical.txt
  discard-paths: yes
