<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tasky Login</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <main class="shell auth-shell">
    <section class="card auth-card">
      <p class="eyebrow">jjp6402</p>
      <h1>Tasky</h1>
      <p class="muted">Sign up or log in to manage MongoDB-backed todos through the public ALB.</p>

      <div id="message" class="message" role="status"></div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" value="demo@example.com">

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" value="DemoPassword123!">

      <div class="button-row">
        <button id="signupBtn" type="button">Sign up</button>
        <button id="loginBtn" type="button" class="secondary">Log in</button>
      </div>

      <p class="hint">Health check: <a href="/healthz">/healthz</a></p>
    </section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
