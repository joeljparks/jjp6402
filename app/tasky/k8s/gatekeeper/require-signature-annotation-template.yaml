apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiresignatureannotation
spec:
  crd:
    spec:
      names:
        kind: K8sRequireSignatureAnnotation
      validation:
        openAPIV3Schema:
          type: object
          properties: {}
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiresignatureannotation

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          annotations := object.get(input.review.object.metadata, "annotations", {})
          object.get(annotations, "jjp6402.io/image-signature-verified", "") != "true"
          msg := "pod must carry jjp6402.io/image-signature-verified=true"
        }
